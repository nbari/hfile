name: tests

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
        default: develop
  push:
    branches:
      - '*'
      - '!master'
      - '!main'
  pull_request:
    branches:
      - '*'

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo version
        run: cargo -V

      - name: check
        run: cargo check

      - name: test
        run: cargo test

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features
